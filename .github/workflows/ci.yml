name: Day 3 Homework - CI/CD Pipeline

on:
  push:
    branches:
      - homework
    paths:
      - "homeworks/Day3/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "homeworks/Day3/**"
      - ".github/workflows/ci.yml"

jobs:
  # ============================================================
  # Job 1: Backend Build & Test
  # ============================================================
  backend:
    name: "🔨 Backend - Build & Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: homeworks/Day3/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: homeworks/Day3/backend/go.sum

      - name: Verify dependencies
        run: go mod verify

      - name: Build backend
        run: go build -v -o main ./cmd/server

      - name: Run unit tests
        run: go test -v -short ./internal/model/... ./internal/scanner/...

      - name: Run tests with coverage
        run: go test -v -short -coverprofile=coverage.out ./internal/model/... ./internal/scanner/...

      - name: Show coverage summary
        run: go tool cover -func=coverage.out

  # ============================================================
  # Job 2: Frontend Build
  # ============================================================
  frontend:
    name: "🎨 Frontend - Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: homeworks/Day3/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: homeworks/Day3/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8080

      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build failed - dist directory not found"
            exit 1
          fi
          echo "✅ Frontend build successful"

  # ============================================================
  # Job 3: Security Scan - Gosec (Go Security Scanner)
  # ============================================================
  gosec:
    name: "🔐 Security - Gosec (Go)"
    runs-on: ubuntu-latest
    needs: [backend]
    defaults:
      run:
        working-directory: homeworks/Day3/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install Gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run Gosec security scanner
        run: |
          gosec -fmt sarif -out gosec-results.sarif ./... || true
          gosec -fmt text ./... 2>&1 | tee gosec-report.txt || true
          echo "✅ Gosec scan completed (see report above)"

      - name: Upload Gosec results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gosec-results
          path: |
            homeworks/Day3/backend/gosec-results.sarif
            homeworks/Day3/backend/gosec-report.txt

  # ============================================================
  # Job 4: Security Scan - Trivy (Dependency Vulnerabilities)
  # ============================================================
  trivy:
    name: "🛡️ Security - Trivy (CVE Scan)"
    runs-on: ubuntu-latest
    needs: [backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner on backend
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "homeworks/Day3/backend"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          format: "table"

      - name: Run Trivy vulnerability scanner on frontend
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "homeworks/Day3/frontend"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          format: "table"

  # ============================================================
  # Job 5: Secret Detection - Gitleaks
  # ============================================================
  gitleaks:
    name: "🔑 Security - Gitleaks (Secret Detection)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for better secret detection

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ============================================================
  # Job 6: Docker Build Test
  # ============================================================
  docker-build:
    name: "🐳 Docker - Build Images"
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./homeworks/Day3/backend
          file: ./homeworks/Day3/backend/Dockerfile
          push: false
          tags: mini-asm-backend:homework
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./homeworks/Day3/frontend
          file: ./homeworks/Day3/frontend/Dockerfile
          push: false
          tags: mini-asm-frontend:homework
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Summary
  # ============================================================
  summary:
    name: "📊 Pipeline Summary"
    runs-on: ubuntu-latest
    needs: [backend, frontend, gosec, trivy, gitleaks, docker-build]
    if: always()

    steps:
      - name: Generate pipeline summary
        run: |
          echo "# 📋 Day 3 Homework - CI/CD Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Build & Test | ${{ needs.backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Build | ${{ needs.frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Gosec Security Scan | ${{ needs.gosec.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy CVE Scan | ${{ needs.trivy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Gitleaks Secret Detection | ${{ needs.gitleaks.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ${{ needs.docker-build.result }} |" >> $GITHUB_STEP_SUMMARY
